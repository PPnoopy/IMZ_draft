<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071522" />
  <title>풋살 캡틴 드래프트</title>
  <style>
    :root {
      --bg: #06121b;
      --panel: #0b2232;
      --panel-2: #0f3044;
      --panel-3: #143d54;
      --line: rgba(255,255,255,.105);
      --text: #f6fbff;
      --muted: #9cb4c3;
      --accent: #6cebc5;
      --accent-2: #59bfff;
      --team-a: #4db5ff;
      --team-b: #ff8f6b;
      --warning: #ffd66f;
      --danger: #ff7688;
      --shadow: 0 24px 70px rgba(0,0,0,.32);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(89,191,255,.16), transparent 30%),
        radial-gradient(circle at 88% 4%, rgba(108,235,197,.12), transparent 26%),
        linear-gradient(180deg, #071522 0%, var(--bg) 55%, #050e15 100%);
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .5;
      background-image:
        linear-gradient(rgba(255,255,255,.017) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.017) 1px, transparent 1px);
      background-size: 38px 38px;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    img { max-width: 100%; display: block; }
    [hidden] { display: none !important; }

    #app { position: relative; z-index: 1; }
    .shell { width: min(1500px, calc(100% - 28px)); margin: 0 auto; padding: 18px 0 48px; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0 18px;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-mark {
      width: 45px;
      height: 45px;
      flex: 0 0 auto;
      border-radius: 15px;
      display: grid;
      place-items: center;
      color: #06202a;
      font-weight: 1000;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 30px rgba(89,191,255,.22);
    }
    .brand h1 { margin: 0; font-size: clamp(18px, 2.4vw, 24px); letter-spacing: -.04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; }
    .top-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

    .stage-nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      padding: 7px;
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.035);
      backdrop-filter: blur(12px);
    }
    .stage-item {
      border: 0;
      border-radius: 12px;
      padding: 11px 8px;
      color: var(--muted);
      background: transparent;
      font-weight: 850;
      font-size: 13px;
      cursor: default;
    }
    .stage-item.active { color: var(--text); background: var(--panel-3); box-shadow: inset 0 0 0 1px rgba(255,255,255,.045); }
    .stage-item.done { color: var(--accent); }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(16,48,68,.94), rgba(8,28,41,.96));
      box-shadow: var(--shadow);
    }
    .panel-pad { padding: clamp(18px, 3vw, 28px); }
    .section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; margin-bottom: 16px; }
    .section-head h2, .section-head h3 { margin: 0; letter-spacing: -.04em; }
    .section-head p { margin: 5px 0 0; color: var(--muted); font-size: 13px; line-height: 1.55; }

    .setup-layout { display: grid; grid-template-columns: minmax(290px, 350px) 1fr; gap: 18px; align-items: start; }
    .settings-card { position: sticky; top: 14px; }
    .form-grid { display: grid; gap: 13px; }
    .field { display: grid; gap: 7px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 800; }
    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 11px 12px;
      color: var(--text);
      background: rgba(0,0,0,.22);
      outline: none;
      transition: .15s ease;
    }
    .input:focus, .select:focus, .textarea:focus { border-color: rgba(108,235,197,.62); box-shadow: 0 0 0 3px rgba(108,235,197,.075); }
    .select option { color: #111; }
    .textarea { min-height: 76px; resize: vertical; line-height: 1.5; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .three { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
    .help { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.55; }
    .notice {
      padding: 12px 13px;
      border: 1px solid rgba(255,214,111,.25);
      border-radius: 13px;
      color: #ffe7a6;
      background: rgba(255,214,111,.07);
      font-size: 12px;
      line-height: 1.55;
    }

    .btn {
      border: 0;
      border-radius: 13px;
      padding: 11px 15px;
      font-weight: 900;
      color: #06212b;
      background: linear-gradient(135deg, var(--accent), #96f1d7);
      transition: .16s ease;
      box-shadow: 0 9px 25px rgba(108,235,197,.11);
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.035); }
    .btn:active { transform: translateY(0); }
    .btn.secondary { color: var(--text); background: rgba(255,255,255,.07); border: 1px solid var(--line); box-shadow: none; }
    .btn.blue { background: linear-gradient(135deg, var(--accent-2), #8bd7ff); }
    .btn.danger { color: white; background: rgba(255,118,136,.14); border: 1px solid rgba(255,118,136,.35); box-shadow: none; }
    .btn.warning { color: #2a2107; background: linear-gradient(135deg, var(--warning), #ffe9a2); }
    .btn.small { padding: 8px 10px; border-radius: 10px; font-size: 12px; }
    .btn.full { width: 100%; }
    .btn:disabled { opacity: .42; cursor: not-allowed; transform: none; filter: none; }
    .icon-btn {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255,255,255,.06);
      font-weight: 900;
    }

    .player-editor-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .editor-card { border: 1px solid var(--line); border-radius: 18px; padding: 13px; background: rgba(20,61,84,.72); display: grid; gap: 11px; }
    .editor-card.is-dragging { opacity: .55; }
    .editor-top { display: flex; align-items: center; gap: 11px; }
    .avatar {
      width: 56px;
      height: 56px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 16px;
      overflow: hidden;
      color: #06212b;
      background: linear-gradient(135deg, rgba(108,235,197,.95), rgba(89,191,255,.92));
      font-weight: 1000;
      font-size: 18px;
      border: 1px solid rgba(255,255,255,.12);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .editor-title { min-width: 0; flex: 1; }
    .editor-title strong { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .editor-title small { display: block; color: var(--muted); margin-top: 3px; }
    .editor-actions { display: flex; gap: 6px; }
    .mini-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
    .mini-grid .input, .mini-grid .select, .mini-grid .textarea { padding: 9px 10px; border-radius: 10px; font-size: 12px; }
    .mini-grid .textarea { min-height: 65px; grid-column: 1 / -1; }
    .stats-editor { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
    .stat-input { display: grid; gap: 4px; }
    .stat-input label { color: var(--muted); font-size: 10px; font-weight: 800; }
    .stat-input input { width: 100%; text-align: center; padding: 8px 4px; }
    .photo-row { display: grid; grid-template-columns: 1fr auto; gap: 7px; align-items: center; }

    .profile-stage { min-height: calc(100vh - 170px); display: grid; place-items: center; }
    .profile-stage-inner { width: min(1120px, 100%); }
    .profile-wrap { display: grid; grid-template-columns: 62px 1fr 62px; gap: 13px; align-items: center; }
    .arrow-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.07);
      color: var(--text);
      font-size: 24px;
      font-weight: 900;
    }
    .profile-page {
      min-height: 590px;
      display: grid;
      grid-template-columns: .92fr 1.08fr;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(145deg, #16465e, #0a2535 68%);
      box-shadow: var(--shadow);
    }
    .profile-visual { position: relative; min-height: 100%; display: grid; place-items: center; padding: 30px; background: linear-gradient(145deg, rgba(108,235,197,.18), rgba(89,191,255,.06)); }
    .profile-photo {
      width: min(380px, 84%);
      aspect-ratio: .82;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 28px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.13);
      font-size: 100px;
      font-weight: 1000;
    }
    .profile-photo img { width: 100%; height: 100%; object-fit: cover; }
    .profile-index { position: absolute; top: 22px; left: 24px; color: var(--muted); font-size: 13px; font-weight: 800; }
    .profile-info { padding: clamp(28px, 5vw, 58px); display: flex; flex-direction: column; justify-content: center; }
    .profile-info h2 { margin: 0; font-size: clamp(42px, 7vw, 76px); line-height: .98; letter-spacing: -.065em; }
    .nickname { margin-top: 7px; color: var(--accent); font-size: 17px; font-weight: 900; }
    .badges { display: flex; flex-wrap: wrap; gap: 7px; margin: 19px 0; }
    .badge { padding: 7px 10px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.065); color: #dcebf3; font-size: 12px; font-weight: 800; }
    .intro-copy { margin: 0 0 26px; color: #d5e4ec; font-size: 17px; line-height: 1.7; }
    .stats { display: grid; gap: 11px; }
    .stat-row { display: grid; grid-template-columns: 62px 1fr 38px; gap: 10px; align-items: center; color: var(--muted); font-size: 12px; }
    .bar { height: 9px; overflow: hidden; border-radius: 999px; background: rgba(255,255,255,.08); }
    .bar > span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .dot-row { display: flex; justify-content: center; gap: 7px; margin-top: 16px; flex-wrap: wrap; }
    .dot { width: 9px; height: 9px; padding: 0; border: 0; border-radius: 50%; background: rgba(255,255,255,.18); }
    .dot.active { width: 25px; border-radius: 999px; background: var(--accent); }

    .draft-head { display: grid; grid-template-columns: 1fr minmax(260px, 460px) 1fr; gap: 13px; align-items: center; margin-bottom: 16px; }
    .captain-chip { padding: 11px 13px; border: 1px solid var(--line); border-radius: 13px; background: rgba(255,255,255,.045); color: var(--muted); font-size: 13px; font-weight: 800; }
    .captain-chip.right { text-align: right; }
    .captain-chip strong { color: var(--text); }
    .turn-card { padding: 13px 18px; border: 1px solid rgba(108,235,197,.24); border-radius: 17px; text-align: center; background: linear-gradient(135deg, rgba(108,235,197,.105), rgba(89,191,255,.08)); }
    .turn-card span { display: block; color: var(--muted); font-size: 11px; font-weight: 800; }
    .turn-card b { display: block; margin-top: 3px; font-size: clamp(18px, 2.8vw, 26px); letter-spacing: -.04em; }
    .pulse { animation: pulse 1.65s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity: .62; } }

    .draft-layout { display: grid; grid-template-columns: minmax(220px, .8fr) minmax(360px, 1.5fr) minmax(220px, .8fr); gap: 14px; align-items: start; }
    .team-column { min-height: 560px; padding: 14px; border: 1px solid var(--line); border-radius: 22px; background: rgba(8,29,42,.76); transition: .18s ease; }
    .team-column.active-a { box-shadow: 0 0 0 2px rgba(77,181,255,.58), 0 20px 60px rgba(77,181,255,.08); }
    .team-column.active-b { box-shadow: 0 0 0 2px rgba(255,143,107,.58), 0 20px 60px rgba(255,143,107,.08); }
    .team-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 5px 2px 13px; }
    .team-title span { font-size: 11px; font-weight: 900; letter-spacing: .14em; }
    .team-title h3 { margin: 0; font-size: 19px; }
    .team-a .team-title span { color: var(--team-a); }
    .team-b .team-title span { color: var(--team-b); }
    .team-list { display: grid; gap: 9px; }
    .team-player {
      display: grid;
      grid-template-columns: 45px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.055);
    }
    .team-player .avatar { width: 45px; height: 45px; border-radius: 12px; font-size: 14px; }
    .team-player strong { display: block; font-size: 13px; }
    .team-player small { display: block; margin-top: 2px; color: var(--muted); font-size: 10px; }
    .pick-no { color: var(--muted); font-weight: 900; font-size: 12px; }
    .pool-panel { padding: 14px; border: 1px solid var(--line); border-radius: 22px; background: linear-gradient(180deg, rgba(16,48,68,.9), rgba(8,28,41,.92)); min-height: 560px; }
    .pool-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 3px 3px 13px; }
    .pool-head h3 { margin: 0; }
    .pool-head span { color: var(--muted); font-size: 12px; }
    .player-pool { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 9px; }
    .player-card {
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 10px;
      color: var(--text);
      text-align: left;
      background: rgba(20,61,84,.72);
      transition: .15s ease;
      min-width: 0;
    }
    .player-card:hover { transform: translateY(-2px); background: rgba(26,77,105,.84); border-color: rgba(108,235,197,.27); }
    .player-thumb {
      width: 100%;
      aspect-ratio: 1.05;
      display: grid;
      place-items: center;
      overflow: hidden;
      margin-bottom: 9px;
      border-radius: 12px;
      color: #06212b;
      background: linear-gradient(135deg, rgba(108,235,197,.92), rgba(89,191,255,.9));
      font-size: 30px;
      font-weight: 1000;
    }
    .player-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .player-card strong { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-card small { display: block; margin-top: 3px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 10px; }
    .pool-actions { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 14px; }
    .empty { padding: 28px 14px; color: var(--muted); text-align: center; border: 1px dashed var(--line); border-radius: 14px; font-size: 12px; }

    .result-hero { display: grid; grid-template-columns: 1fr auto 1fr; gap: 18px; align-items: center; margin-bottom: 18px; }
    .result-vs { width: 68px; height: 68px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 50%; color: var(--muted); background: rgba(255,255,255,.055); font-weight: 1000; }
    .result-team { padding: 20px; border: 1px solid var(--line); border-radius: 20px; background: rgba(255,255,255,.045); }
    .result-team.a { box-shadow: inset 4px 0 0 var(--team-a); }
    .result-team.b { box-shadow: inset -4px 0 0 var(--team-b); text-align: right; }
    .result-team small { color: var(--muted); font-weight: 900; letter-spacing: .1em; }
    .result-team h2 { margin: 5px 0 2px; font-size: clamp(26px, 5vw, 44px); letter-spacing: -.05em; }
    .result-team p { margin: 0; color: var(--muted); }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .result-list { display: grid; gap: 9px; }
    .balance-card { margin-top: 14px; padding: 16px; border: 1px solid var(--line); border-radius: 17px; background: rgba(255,255,255,.04); }
    .balance-card h3 { margin: 0 0 12px; }
    .balance-row { display: grid; grid-template-columns: 55px 1fr 45px 1fr 45px; gap: 8px; align-items: center; margin: 8px 0; color: var(--muted); font-size: 11px; }
    .balance-row b { color: var(--text); text-align: center; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(0,7,12,.73);
      backdrop-filter: blur(11px);
    }
    .modal { width: min(790px, 100%); max-height: calc(100vh - 36px); overflow: auto; border: 1px solid var(--line); border-radius: 25px; background: linear-gradient(145deg, #153f56, #091f2d); box-shadow: var(--shadow); }
    .modal-top { display: flex; justify-content: flex-end; padding: 12px 12px 0; }
    .modal-body { padding: 0 24px 24px; }
    .modal-profile { display: grid; grid-template-columns: 210px 1fr; gap: 22px; align-items: center; }
    .modal-profile .profile-photo { width: 100%; font-size: 60px; }
    .modal-profile h2 { margin: 0; font-size: clamp(32px, 6vw, 54px); letter-spacing: -.055em; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; flex-wrap: wrap; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 100;
      transform: translate(-50%, 18px);
      opacity: 0;
      pointer-events: none;
      padding: 11px 15px;
      border: 1px solid var(--line);
      border-radius: 13px;
      color: var(--text);
      background: rgba(10,33,47,.96);
      box-shadow: 0 16px 45px rgba(0,0,0,.35);
      transition: .2s ease;
      font-size: 13px;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast.error { border-color: rgba(255,118,136,.42); }

    .kbd { padding: 2px 6px; border: 1px solid var(--line); border-bottom-width: 2px; border-radius: 6px; color: #dceaf1; background: rgba(255,255,255,.055); font-size: 10px; font-weight: 900; }

    @media (max-width: 1100px) {
      .setup-layout { grid-template-columns: 1fr; }
      .settings-card { position: static; }
      .draft-layout { grid-template-columns: 1fr 1fr; }
      .pool-panel { grid-column: 1 / -1; grid-row: 1; }
      .team-column { min-height: auto; }
      .player-pool { grid-template-columns: repeat(4, minmax(0,1fr)); }
    }

    @media (max-width: 780px) {
      .shell { width: min(100% - 18px, 1500px); }
      .topbar { align-items: flex-start; }
      .brand p { display: none; }
      .top-actions .label { display: none; }
      .stage-nav { grid-template-columns: repeat(4, minmax(0,1fr)); }
      .stage-item { padding: 10px 3px; font-size: 11px; }
      .player-editor-grid { grid-template-columns: 1fr; }
      .profile-wrap { grid-template-columns: 1fr; }
      .arrow-btn { position: absolute; z-index: 3; width: 42px; height: 42px; font-size: 18px; }
      .profile-wrap .prev { left: 18px; }
      .profile-wrap .next { right: 18px; }
      .profile-page { grid-template-columns: 1fr; min-height: 0; }
      .profile-visual { min-height: 330px; }
      .profile-photo { width: min(260px, 70%); }
      .profile-info { padding: 28px 22px 34px; }
      .profile-info h2 { font-size: 48px; }
      .draft-head { grid-template-columns: 1fr 1fr; }
      .turn-card { grid-column: 1 / -1; grid-row: 1; }
      .draft-layout { grid-template-columns: 1fr; }
      .pool-panel { grid-column: auto; grid-row: auto; }
      .player-pool { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .result-hero { grid-template-columns: 1fr; }
      .result-vs { margin: -7px auto; }
      .result-team.b { text-align: left; box-shadow: inset 4px 0 0 var(--team-b); }
      .result-grid { grid-template-columns: 1fr; }
      .modal-profile { grid-template-columns: 1fr; }
      .modal-profile .profile-photo { width: min(260px, 70%); margin: auto; }
    }

    @media (max-width: 520px) {
      .topbar { gap: 8px; }
      .brand-mark { width: 40px; height: 40px; border-radius: 13px; }
      .brand h1 { font-size: 17px; }
      .top-actions { gap: 5px; }
      .top-actions .btn { padding: 8px 9px; }
      .two, .three { grid-template-columns: 1fr; }
      .mini-grid { grid-template-columns: 1fr; }
      .stats-editor { grid-template-columns: repeat(2,1fr); }
      .player-pool { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .profile-visual { min-height: 285px; }
      .profile-info h2 { font-size: 41px; }
      .draft-head { grid-template-columns: 1fr; }
      .captain-chip.right { text-align: left; }
      .turn-card { grid-column: auto; }
      .modal-body { padding: 0 16px 18px; }
      .balance-row { grid-template-columns: 46px 1fr 34px 1fr 34px; }
    }

    @media print {
      body { background: white; color: #111; }
      body::before, .topbar, .stage-nav, .result-actions, .toast { display: none !important; }
      .shell { width: 100%; padding: 0; }
      .panel { box-shadow: none; background: white; border: 1px solid #ddd; }
      .team-player, .result-team, .balance-card { background: white; color: #111; }
      .team-player small, .result-team p, .balance-row { color: #555; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast" aria-live="polite"></div>
  <input id="jsonImport" type="file" accept="application/json" hidden />
  <script>
    (() => {
      'use strict';

      const STORAGE_KEY = 'futsal-moderator-draft-v3';
      const app = document.getElementById('app');
      const toastEl = document.getElementById('toast');
      const jsonImport = document.getElementById('jsonImport');

      const defaultPlayers = [
        ['선수 1', '멀티 플레이어', 'ALL', '오른발', '어디서든 제 몫을 하는 밸런스형 선수입니다.', 76, 72, 80, 74],
        ['선수 2', '스피드 스타', 'FW', '오른발', '공간을 빠르게 파고들고 역습에서 강점을 보입니다.', 82, 58, 78, 90],
        ['선수 3', '중원 엔진', 'MF', '양발', '패스 연결과 활동량으로 팀의 템포를 조절합니다.', 77, 70, 88, 76],
        ['선수 4', '수비 리더', 'DF', '오른발', '대인 수비와 커버 플레이가 안정적인 선수입니다.', 60, 88, 82, 68],
        ['선수 5', '골 사냥꾼', 'FW', '왼발', '문전 집중력과 강한 슈팅이 장점입니다.', 90, 55, 72, 79],
        ['선수 6', '압박 머신', 'MF', '오른발', '쉬지 않고 압박하며 세컨드 볼을 잘 회수합니다.', 70, 79, 92, 78],
        ['선수 7', '빌드업 장인', 'DF', '양발', '후방에서 침착하게 패스를 전개합니다.', 68, 82, 79, 66],
        ['선수 8', '라인 브레이커', 'FW', '오른발', '수비 뒷공간 침투와 원터치 플레이가 좋습니다.', 84, 57, 75, 86],
        ['선수 9', '밸런서', 'MF', '왼발', '공수 간격을 조율하고 동료를 살리는 플레이를 합니다.', 73, 76, 84, 72],
        ['선수 10', '철벽', 'DF', '오른발', '몸싸움과 슈팅 차단에 강점이 있습니다.', 55, 91, 85, 62],
        ['선수 11', '테크니션', 'MF', '양발', '좁은 공간에서 볼을 지키고 찬스를 만듭니다.', 85, 64, 75, 81],
        ['선수 12', '유틸리티', 'ALL', '오른발', '팀이 필요한 위치를 빠르게 채우는 선수입니다.', 72, 74, 81, 73]
      ].map((p, i) => ({
        id: makeId(),
        name: p[0], nickname: p[1], position: p[2], foot: p[3], intro: p[4], strengths: p[1],
        attack: p[5], defense: p[6], stamina: p[7], pace: p[8], photo: '', order: i
      }));

      const initialState = () => ({
        version: 3,
        stage: 'setup',
        eventName: '우리끼리 풋살 드래프트',
        captainA: '주장 A',
        captainB: '주장 B',
        mode: 'snake',
        firstCaptain: 'A',
        players: structuredClone(defaultPlayers),
        picks: [],
        profileIndex: 0,
        selectedPlayerId: null,
        updatedAt: Date.now()
      });

      let state = loadState();
      let toastTimer = null;
      let photoTargetId = null;

      function makeId() {
        try { return crypto.randomUUID(); }
        catch { return 'p_' + Math.random().toString(36).slice(2) + Date.now().toString(36); }
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return initialState();
          const parsed = JSON.parse(raw);
          if (!parsed || !Array.isArray(parsed.players) || !Array.isArray(parsed.picks)) return initialState();
          return { ...initialState(), ...parsed, selectedPlayerId: null };
        } catch {
          return initialState();
        }
      }

      function saveState() {
        state.updatedAt = Date.now();
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        catch (error) { toast('브라우저 저장 공간이 부족합니다. 선수 사진 용량을 줄여 주세요.', true); }
      }

      function setState(patch, shouldRender = true) {
        state = { ...state, ...patch };
        saveState();
        if (shouldRender) render();
      }

      function esc(value = '') {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function clamp(value, min = 0, max = 100) {
        const n = Number(value);
        return Number.isFinite(n) ? Math.max(min, Math.min(max, Math.round(n))) : min;
      }

      function initials(name = '') {
        const clean = String(name).trim();
        return esc((clean.slice(0, 2) || '선수').toUpperCase());
      }

      function avatar(player, className = 'avatar') {
        const image = player?.photo ? `<img src="${esc(player.photo)}" alt="${esc(player.name)}" />` : initials(player?.name);
        return `<div class="${className}">${image}</div>`;
      }

      function toast(message, isError = false) {
        toastEl.textContent = message;
        toastEl.className = 'toast show' + (isError ? ' error' : '');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { toastEl.className = 'toast'; }, 2300);
      }

      function stageIndex(stage) { return ['setup', 'profiles', 'draft', 'result'].indexOf(stage); }

      function stageNav() {
        const stages = [
          ['setup', '1. 선수 등록'],
          ['profiles', '2. 프로필 소개'],
          ['draft', '3. 주장 드래프트'],
          ['result', '4. 팀 확정']
        ];
        const current = stageIndex(state.stage);
        return `<nav class="stage-nav">${stages.map(([key, label], i) => `<div class="stage-item ${i === current ? 'active' : ''} ${i < current ? 'done' : ''}">${label}</div>`).join('')}</nav>`;
      }

      function topbar() {
        return `<header class="topbar">
          <div class="brand">
            <div class="brand-mark">FD</div>
            <div><h1>${esc(state.eventName || '풋살 캡틴 드래프트')}</h1><p>사회자 진행용 · 자동 저장 · Netlify 정적 배포</p></div>
          </div>
          <div class="top-actions">
            <button class="btn secondary small" data-fullscreen><span class="label">발표 화면</span> ⛶</button>
            <button class="btn secondary small" data-export><span class="label">백업</span> ↓</button>
            <button class="btn secondary small" data-import><span class="label">불러오기</span> ↑</button>
            <button class="btn danger small" data-reset><span class="label">초기화</span> ↺</button>
          </div>
        </header>`;
      }

      function modeLabel() {
        return state.mode === 'snake' ? '스네이크 A-B-B-A' : '번갈아 A-B-A-B';
      }

      function nextTurn(pickCount = state.picks.length) {
        const first = state.firstCaptain === 'B' ? 'B' : 'A';
        const other = first === 'A' ? 'B' : 'A';
        if (state.mode === 'snake') {
          const seq = [first, other, other, first];
          return seq[pickCount % 4];
        }
        return pickCount % 2 === 0 ? first : other;
      }

      function setupView() {
        return `<main class="shell">
          ${topbar()}
          ${stageNav()}
          <div class="setup-layout">
            <aside class="panel panel-pad settings-card">
              <div class="section-head"><div><h2>드래프트 설정</h2><p>사회자가 한 기기에서 전체 진행을 조작합니다.</p></div></div>
              <div class="form-grid">
                <div class="field"><label>행사 이름</label><input class="input" id="eventName" value="${esc(state.eventName)}" maxlength="40" /></div>
                <div class="two">
                  <div class="field"><label>주장 A 이름</label><input class="input" id="captainA" value="${esc(state.captainA)}" maxlength="16" /></div>
                  <div class="field"><label>주장 B 이름</label><input class="input" id="captainB" value="${esc(state.captainB)}" maxlength="16" /></div>
                </div>
                <div class="field"><label>지명 방식</label>
                  <select class="select" id="mode">
                    <option value="snake" ${state.mode === 'snake' ? 'selected' : ''}>스네이크 · A → B → B → A 반복</option>
                    <option value="alternate" ${state.mode === 'alternate' ? 'selected' : ''}>번갈아 · A → B → A → B 반복</option>
                  </select>
                </div>
                <div class="field"><label>첫 지명</label>
                  <select class="select" id="firstCaptain">
                    <option value="A" ${state.firstCaptain === 'A' ? 'selected' : ''}>주장 A</option>
                    <option value="B" ${state.firstCaptain === 'B' ? 'selected' : ''}>주장 B</option>
                  </select>
                </div>
                <div class="notice">이 버전은 <b>사회자 1명</b>이 선수 소개와 지명을 모두 조작하는 방식입니다. 별도 서버 없이 Netlify에 바로 올릴 수 있으며 데이터는 현재 브라우저에 자동 저장됩니다.</div>
                <button class="btn full" data-save-setup>설정 저장</button>
                <button class="btn blue full" data-go-profiles ${state.players.length < 2 ? 'disabled' : ''}>선수 소개 시작</button>
                <p class="help">선수 카드에서 이름·포지션·소개·능력치를 수정할 수 있습니다. 사진은 자동으로 축소해 저장합니다.</p>
              </div>
            </aside>

            <section class="panel panel-pad">
              <div class="section-head">
                <div><h2>선수 프로필</h2><p>${state.players.length}명 등록됨 · 카드 순서가 소개 순서입니다.</p></div>
                <button class="btn small" data-add-player>+ 선수 추가</button>
              </div>
              <div class="player-editor-grid">
                ${state.players.map((p, i) => editorCard(p, i)).join('')}
              </div>
            </section>
          </div>
        </main>`;
      }

      function editorCard(player, index) {
        return `<article class="editor-card" data-player-editor="${esc(player.id)}">
          <div class="editor-top">
            ${avatar(player)}
            <div class="editor-title"><strong>${esc(player.name || `선수 ${index + 1}`)}</strong><small>${index + 1}번째 소개 · ${esc(player.position || 'ALL')}</small></div>
            <div class="editor-actions">
              <button class="icon-btn" data-move-up="${esc(player.id)}" title="위로" ${index === 0 ? 'disabled' : ''}>↑</button>
              <button class="icon-btn" data-move-down="${esc(player.id)}" title="아래로" ${index === state.players.length - 1 ? 'disabled' : ''}>↓</button>
              <button class="icon-btn" data-delete-player="${esc(player.id)}" title="삭제">×</button>
            </div>
          </div>
          <div class="mini-grid">
            <input class="input" data-key="name" value="${esc(player.name)}" placeholder="이름" maxlength="18" />
            <input class="input" data-key="nickname" value="${esc(player.nickname)}" placeholder="별명 / 한 줄 캐릭터" maxlength="30" />
            <select class="select" data-key="position">
              ${['GK','DF','MF','FW','ALL'].map(v => `<option value="${v}" ${player.position === v ? 'selected' : ''}>${v}</option>`).join('')}
            </select>
            <select class="select" data-key="foot">
              ${['오른발','왼발','양발'].map(v => `<option value="${v}" ${player.foot === v ? 'selected' : ''}>${v}</option>`).join('')}
            </select>
            <input class="input" data-key="strengths" value="${esc(player.strengths)}" placeholder="강점 키워드" maxlength="30" />
            <div class="photo-row">
              <input class="input" data-key="photo" value="${esc(player.photo && !player.photo.startsWith('data:') ? player.photo : '')}" placeholder="사진 URL 또는 업로드" />
              <button class="btn secondary small" data-photo-upload="${esc(player.id)}">사진</button>
            </div>
            <textarea class="textarea" data-key="intro" placeholder="선수 소개">${esc(player.intro)}</textarea>
          </div>
          <div class="stats-editor">
            ${statInput('공격', 'attack', player.attack)}
            ${statInput('수비', 'defense', player.defense)}
            ${statInput('체력', 'stamina', player.stamina)}
            ${statInput('속도', 'pace', player.pace)}
          </div>
          <button class="btn secondary small" data-save-player="${esc(player.id)}">이 선수 저장</button>
        </article>`;
      }

      function statInput(label, key, value) {
        return `<div class="stat-input"><label>${label}</label><input class="input" type="number" min="0" max="100" data-key="${key}" value="${clamp(value)}" /></div>`;
      }

      function profileView() {
        const p = state.players[state.profileIndex] || state.players[0];
        if (!p) return setupView();
        return `<main class="shell">
          ${topbar()}
          ${stageNav()}
          <section class="profile-stage">
            <div class="profile-stage-inner">
              <div class="section-head">
                <div><h2>선수 프로필 소개</h2><p>좌우 화살표 또는 <span class="kbd">←</span> <span class="kbd">→</span> 키로 넘길 수 있습니다.</p></div>
                <div class="top-actions">
                  <button class="btn secondary" data-back-setup>선수 수정</button>
                  <button class="btn" data-start-draft>드래프트 시작</button>
                </div>
              </div>
              <div class="profile-wrap">
                <button class="arrow-btn prev" data-profile-prev aria-label="이전 선수">←</button>
                ${profilePage(p, state.profileIndex, state.players.length)}
                <button class="arrow-btn next" data-profile-next aria-label="다음 선수">→</button>
              </div>
              <div class="dot-row">${state.players.map((_, i) => `<button class="dot ${i === state.profileIndex ? 'active' : ''}" data-profile-index="${i}" aria-label="${i + 1}번 선수"></button>`).join('')}</div>
            </div>
          </section>
        </main>`;
      }

      function profilePage(player, index, total) {
        return `<article class="profile-page">
          <div class="profile-visual">
            <div class="profile-index">PLAYER ${String(index + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}</div>
            ${avatar(player, 'profile-photo')}
          </div>
          <div class="profile-info">
            <h2>${esc(player.name)}</h2>
            <div class="nickname">${esc(player.nickname || player.strengths || '플레이어')}</div>
            <div class="badges">
              <span class="badge">${esc(player.position || 'ALL')}</span>
              <span class="badge">${esc(player.foot || '오른발')}</span>
              <span class="badge">${esc(player.strengths || '팀플레이')}</span>
            </div>
            <p class="intro-copy">${esc(player.intro || '등록된 소개가 없습니다.')}</p>
            <div class="stats">
              ${statRow('공격', player.attack)}
              ${statRow('수비', player.defense)}
              ${statRow('체력', player.stamina)}
              ${statRow('스피드', player.pace)}
            </div>
          </div>
        </article>`;
      }

      function statRow(label, value) {
        const n = clamp(value);
        return `<div class="stat-row"><span>${label}</span><div class="bar"><span style="width:${n}%"></span></div><b>${n}</b></div>`;
      }

      function draftView() {
        const pickedIds = new Set(state.picks.map(p => p.playerId));
        const available = state.players.filter(p => !pickedIds.has(p.id));
        const teamA = getTeam('A');
        const teamB = getTeam('B');
        const done = available.length === 0 && state.players.length > 0;
        if (done && state.stage !== 'result') {
          queueMicrotask(() => setState({ stage: 'result', selectedPlayerId: null }));
        }
        const turn = nextTurn();
        const captain = turn === 'A' ? state.captainA : state.captainB;

        return `<main class="shell">
          ${topbar()}
          ${stageNav()}
          <div class="draft-head">
            <div class="captain-chip"><strong>TEAM A</strong> · ${esc(state.captainA)} · ${teamA.length}명</div>
            <div class="turn-card"><span>${esc(modeLabel())} · ${state.picks.length + 1}번째 선택</span><b class="pulse">${esc(captain)} 지명 차례</b></div>
            <div class="captain-chip right"><strong>TEAM B</strong> · ${esc(state.captainB)} · ${teamB.length}명</div>
          </div>

          <div class="draft-layout">
            ${teamColumn('A', teamA, turn)}
            <section class="pool-panel">
              <div class="pool-head"><h3>남은 선수</h3><span>${available.length}명 · 선수를 누르면 상세 확인 후 지명</span></div>
              ${available.length ? `<div class="player-pool">${available.map(playerCard).join('')}</div>` : '<div class="empty">모든 선수가 지명되었습니다.</div>'}
              <div class="pool-actions">
                <button class="btn secondary small" data-back-profiles>프로필 보기</button>
                <button class="btn secondary small" data-undo ${state.picks.length ? '' : 'disabled'}>마지막 지명 취소</button>
                <button class="btn warning small" data-finish-early ${state.picks.length ? '' : 'disabled'}>현재 상태로 팀 확정</button>
              </div>
            </section>
            ${teamColumn('B', teamB, turn)}
          </div>
          ${state.selectedPlayerId ? playerModal(state.players.find(p => p.id === state.selectedPlayerId), turn) : ''}
        </main>`;
      }

      function getTeam(team) {
        return state.picks
          .filter(p => p.team === team)
          .map(pick => ({ pick, player: state.players.find(player => player.id === pick.playerId) }))
          .filter(item => item.player);
      }

      function teamColumn(team, items, turn) {
        const active = turn === team ? `active-${team.toLowerCase()}` : '';
        const captain = team === 'A' ? state.captainA : state.captainB;
        return `<aside class="team-column team-${team.toLowerCase()} ${active}">
          <div class="team-title"><span>TEAM ${team}</span><h3>${esc(captain)}</h3></div>
          <div class="team-list">
            ${items.length ? items.map(({ pick, player }) => `<div class="team-player">${avatar(player)}<div><strong>${esc(player.name)}</strong><small>${esc(player.position)} · ${esc(player.strengths)}</small></div><span class="pick-no">#${pick.pickNumber}</span></div>`).join('') : '<div class="empty">아직 지명된 선수가 없습니다.</div>'}
          </div>
        </aside>`;
      }

      function playerCard(player) {
        return `<button class="player-card" data-open-player="${esc(player.id)}">
          <div class="player-thumb">${player.photo ? `<img src="${esc(player.photo)}" alt="${esc(player.name)}" />` : initials(player.name)}</div>
          <strong>${esc(player.name)}</strong>
          <small>${esc(player.position)} · ${esc(player.strengths)}</small>
        </button>`;
      }

      function playerModal(player, turn) {
        if (!player) return '';
        const captain = turn === 'A' ? state.captainA : state.captainB;
        return `<div class="modal-backdrop" data-close-modal>
          <article class="modal" role="dialog" aria-modal="true" aria-label="선수 지명 확인">
            <div class="modal-top"><button class="icon-btn" data-close-modal>×</button></div>
            <div class="modal-body">
              <div class="modal-profile">
                ${avatar(player, 'profile-photo')}
                <div>
                  <h2>${esc(player.name)}</h2>
                  <div class="nickname">${esc(player.nickname || player.strengths)}</div>
                  <div class="badges"><span class="badge">${esc(player.position)}</span><span class="badge">${esc(player.foot)}</span><span class="badge">${esc(player.strengths)}</span></div>
                  <p class="intro-copy">${esc(player.intro)}</p>
                </div>
              </div>
              <div class="stats">${statRow('공격', player.attack)}${statRow('수비', player.defense)}${statRow('체력', player.stamina)}${statRow('스피드', player.pace)}</div>
              <div class="modal-actions">
                <button class="btn secondary" data-close-modal>닫기</button>
                <button class="btn ${turn === 'B' ? 'warning' : 'blue'}" data-pick="${esc(player.id)}">${esc(captain)} · TEAM ${turn}로 지명</button>
              </div>
            </div>
          </article>
        </div>`;
      }

      function resultView() {
        const teamA = getTeam('A').map(x => x.player);
        const teamB = getTeam('B').map(x => x.player);
        return `<main class="shell">
          ${topbar()}
          ${stageNav()}
          <section class="panel panel-pad">
            <div class="section-head">
              <div><h2>팀 편성 완료</h2><p>결과를 복사하거나 인쇄해 단체방에 공유할 수 있습니다.</p></div>
              <div class="top-actions result-actions">
                <button class="btn secondary" data-return-draft>드래프트로 돌아가기</button>
                <button class="btn blue" data-copy-result>결과 복사</button>
                <button class="btn" data-print>인쇄 / PDF</button>
              </div>
            </div>
            <div class="result-hero">
              <div class="result-team a"><small>TEAM A</small><h2>${esc(state.captainA)}</h2><p>${teamA.length}명 · ${esc(teamA.map(p => p.name).join(', ') || '선수 없음')}</p></div>
              <div class="result-vs">VS</div>
              <div class="result-team b"><small>TEAM B</small><h2>${esc(state.captainB)}</h2><p>${teamB.length}명 · ${esc(teamB.map(p => p.name).join(', ') || '선수 없음')}</p></div>
            </div>
            <div class="result-grid">
              <div class="result-list">${teamA.length ? teamA.map((p, i) => resultPlayer(p, i + 1, 'A')).join('') : '<div class="empty">TEAM A 선수가 없습니다.</div>'}</div>
              <div class="result-list">${teamB.length ? teamB.map((p, i) => resultPlayer(p, i + 1, 'B')).join('') : '<div class="empty">TEAM B 선수가 없습니다.</div>'}</div>
            </div>
            ${balanceSummary(teamA, teamB)}
          </section>
        </main>`;
      }

      function resultPlayer(player, index, team) {
        return `<div class="team-player team-${team.toLowerCase()}">${avatar(player)}<div><strong>${index}. ${esc(player.name)}</strong><small>${esc(player.position)} · ${esc(player.strengths)}</small></div><span class="pick-no">${clamp(player.attack)}/${clamp(player.defense)}</span></div>`;
      }

      function average(players, key) {
        if (!players.length) return 0;
        return Math.round(players.reduce((sum, p) => sum + clamp(p[key]), 0) / players.length);
      }

      function balanceSummary(teamA, teamB) {
        const rows = [
          ['공격', 'attack'], ['수비', 'defense'], ['체력', 'stamina'], ['스피드', 'pace']
        ];
        return `<div class="balance-card"><h3>팀 평균 능력치</h3>${rows.map(([label, key]) => {
          const a = average(teamA, key), b = average(teamB, key);
          return `<div class="balance-row"><span>${label}</span><div class="bar"><span style="width:${a}%"></span></div><b>${a}</b><div class="bar"><span style="width:${b}%"></span></div><b>${b}</b></div>`;
        }).join('')}</div>`;
      }

      function collectSetup() {
        const eventName = document.getElementById('eventName')?.value.trim() || '풋살 캡틴 드래프트';
        const captainA = document.getElementById('captainA')?.value.trim() || '주장 A';
        const captainB = document.getElementById('captainB')?.value.trim() || '주장 B';
        const mode = document.getElementById('mode')?.value === 'alternate' ? 'alternate' : 'snake';
        const firstCaptain = document.getElementById('firstCaptain')?.value === 'B' ? 'B' : 'A';
        return { eventName, captainA, captainB, mode, firstCaptain };
      }

      function collectPlayer(id) {
        const card = document.querySelector(`[data-player-editor="${CSS.escape(id)}"]`);
        const existing = state.players.find(p => p.id === id);
        if (!card || !existing) return existing;
        const next = { ...existing };
        card.querySelectorAll('[data-key]').forEach(input => {
          const key = input.dataset.key;
          if (['attack','defense','stamina','pace'].includes(key)) next[key] = clamp(input.value);
          else if (key === 'photo') {
            const value = input.value.trim();
            if (value) next.photo = value;
          } else next[key] = input.value.trim();
        });
        if (!next.name) next.name = '이름 없음';
        return next;
      }

      function saveAllVisiblePlayers() {
        if (state.stage !== 'setup') return state.players;
        return state.players.map(p => collectPlayer(p.id));
      }

      function render() {
        if (state.stage === 'setup') app.innerHTML = setupView();
        else if (state.stage === 'profiles') app.innerHTML = profileView();
        else if (state.stage === 'draft') app.innerHTML = draftView();
        else app.innerHTML = resultView();
        document.title = `${state.eventName || '풋살 드래프트'} · ${state.stage === 'result' ? '팀 결과' : '진행'}`;
      }

      function movePlayer(id, direction) {
        const players = saveAllVisiblePlayers();
        const index = players.findIndex(p => p.id === id);
        const target = index + direction;
        if (index < 0 || target < 0 || target >= players.length) return;
        [players[index], players[target]] = [players[target], players[index]];
        setState({ players });
      }

      function pickPlayer(id) {
        if (state.picks.some(p => p.playerId === id)) return;
        const team = nextTurn();
        const picks = [...state.picks, { playerId: id, team, pickNumber: state.picks.length + 1, pickedAt: Date.now() }];
        const done = picks.length >= state.players.length;
        setState({ picks, selectedPlayerId: null, stage: done ? 'result' : 'draft' });
        const player = state.players.find(p => p.id === id);
        toast(`${player?.name || '선수'} → TEAM ${team}`);
      }

      async function compressImage(file) {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const img = await new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = dataUrl;
        });
        const maxSide = 720;
        const ratio = Math.min(1, maxSide / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(img.width * ratio));
        canvas.height = Math.max(1, Math.round(img.height * ratio));
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg', .78);
      }

      function exportJson() {
        const payload = { ...state, selectedPlayerId: null, exportedAt: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `futsal-draft-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function resultText() {
        const a = getTeam('A').map(x => x.player.name);
        const b = getTeam('B').map(x => x.player.name);
        return `[${state.eventName}]\n\nTEAM A · ${state.captainA}\n${a.map((n, i) => `${i + 1}. ${n}`).join('\n') || '-'}\n\nTEAM B · ${state.captainB}\n${b.map((n, i) => `${i + 1}. ${n}`).join('\n') || '-'}`;
      }

      app.addEventListener('click', async (event) => {
        const target = event.target.closest('button, [data-close-modal]');
        if (!target) return;

        if (target.matches('[data-fullscreen]')) {
          try {
            if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
            else await document.exitFullscreen();
          } catch { toast('이 브라우저에서는 전체 화면을 열 수 없습니다.', true); }
          return;
        }

        if (target.matches('[data-export]')) { exportJson(); toast('백업 파일을 저장했습니다.'); return; }
        if (target.matches('[data-import]')) { jsonImport.click(); return; }
        if (target.matches('[data-reset]')) {
          if (!confirm('현재 선수와 드래프트 기록을 모두 초기화할까요?')) return;
          state = initialState(); saveState(); render(); toast('초기화했습니다.'); return;
        }

        if (target.matches('[data-save-setup]')) {
          const players = saveAllVisiblePlayers();
          setState({ ...collectSetup(), players });
          toast('설정을 저장했습니다.'); return;
        }

        if (target.matches('[data-add-player]')) {
          const players = saveAllVisiblePlayers();
          players.push({ id: makeId(), name: `선수 ${players.length + 1}`, nickname: '', position: 'ALL', foot: '오른발', intro: '나를 한 줄로 소개해 주세요.', strengths: '팀플레이', attack: 70, defense: 70, stamina: 70, pace: 70, photo: '' });
          setState({ players }); toast('선수를 추가했습니다.'); return;
        }

        if (target.matches('[data-save-player]')) {
          const id = target.dataset.savePlayer;
          const players = state.players.map(p => p.id === id ? collectPlayer(id) : p);
          const saved = players.find(p => p.id === id);
          setState({ players }); toast(`${saved?.name || '선수'} 프로필을 저장했습니다.`); return;
        }

        if (target.matches('[data-delete-player]')) {
          const id = target.dataset.deletePlayer;
          const p = state.players.find(x => x.id === id);
          if (!confirm(`${p?.name || '이 선수'}를 삭제할까요?`)) return;
          const players = saveAllVisiblePlayers().filter(x => x.id !== id);
          const picks = state.picks.filter(x => x.playerId !== id).map((x, i) => ({ ...x, pickNumber: i + 1 }));
          setState({ players, picks }); return;
        }

        if (target.matches('[data-move-up]')) { movePlayer(target.dataset.moveUp, -1); return; }
        if (target.matches('[data-move-down]')) { movePlayer(target.dataset.moveDown, 1); return; }

        if (target.matches('[data-photo-upload]')) {
          photoTargetId = target.dataset.photoUpload;
          const input = document.createElement('input');
          input.type = 'file'; input.accept = 'image/*';
          input.onchange = async () => {
            const file = input.files?.[0];
            if (!file) return;
            try {
              const photo = await compressImage(file);
              const currentPlayers = saveAllVisiblePlayers();
              const players = currentPlayers.map(p => p.id === photoTargetId ? { ...p, photo } : p);
              setState({ players }); toast('사진을 등록했습니다.');
            } catch { toast('사진을 읽지 못했습니다.', true); }
          };
          input.click(); return;
        }

        if (target.matches('[data-go-profiles]')) {
          const players = saveAllVisiblePlayers().filter(p => p.name.trim());
          if (players.length < 2) { toast('선수를 최소 2명 등록해 주세요.', true); return; }
          if (state.picks.length && !confirm('선수 소개를 다시 시작하면 기존 지명 기록을 유지합니다. 계속할까요?')) return;
          setState({ ...collectSetup(), players, stage: 'profiles', profileIndex: 0, selectedPlayerId: null }); return;
        }

        if (target.matches('[data-back-setup]')) { setState({ stage: 'setup', selectedPlayerId: null }); return; }
        if (target.matches('[data-profile-prev]')) { setState({ profileIndex: (state.profileIndex - 1 + state.players.length) % state.players.length }); return; }
        if (target.matches('[data-profile-next]')) { setState({ profileIndex: (state.profileIndex + 1) % state.players.length }); return; }
        if (target.matches('[data-profile-index]')) { setState({ profileIndex: Number(target.dataset.profileIndex) || 0 }); return; }

        if (target.matches('[data-start-draft]')) {
          if (state.picks.length && !confirm('기존 지명 기록이 있습니다. 그대로 이어서 진행할까요?\n취소 후 초기화 버튼으로 새로 시작할 수 있습니다.')) return;
          setState({ stage: 'draft', selectedPlayerId: null }); return;
        }
        if (target.matches('[data-back-profiles]')) { setState({ stage: 'profiles', selectedPlayerId: null }); return; }

        if (target.matches('[data-open-player]')) { setState({ selectedPlayerId: target.dataset.openPlayer }); return; }
        if (target.matches('[data-close-modal]')) {
          if (target.classList.contains('modal-backdrop') && event.target !== target) return;
          setState({ selectedPlayerId: null }); return;
        }
        if (target.matches('[data-pick]')) { pickPlayer(target.dataset.pick); return; }

        if (target.matches('[data-undo]')) {
          if (!state.picks.length) return;
          const last = state.picks[state.picks.length - 1];
          const player = state.players.find(p => p.id === last.playerId);
          setState({ picks: state.picks.slice(0, -1), selectedPlayerId: null, stage: 'draft' });
          toast(`${player?.name || '마지막 선수'} 지명을 취소했습니다.`); return;
        }

        if (target.matches('[data-finish-early]')) {
          if (!confirm('남은 선수가 있어도 현재 상태로 팀을 확정할까요?')) return;
          setState({ stage: 'result', selectedPlayerId: null }); return;
        }
        if (target.matches('[data-return-draft]')) { setState({ stage: 'draft', selectedPlayerId: null }); return; }
        if (target.matches('[data-copy-result]')) {
          try { await navigator.clipboard.writeText(resultText()); toast('팀 결과를 복사했습니다.'); }
          catch { toast('복사에 실패했습니다. 브라우저 권한을 확인해 주세요.', true); }
          return;
        }
        if (target.matches('[data-print]')) { window.print(); return; }
      });

      app.addEventListener('change', (event) => {
        if (state.stage !== 'setup') return;
        if (event.target.matches('#eventName, #captainA, #captainB, #mode, #firstCaptain')) return;
        if (event.target.matches('[data-key]')) {
          const card = event.target.closest('[data-player-editor]');
          if (!card) return;
          const id = card.dataset.playerEditor;
          const players = state.players.map(p => p.id === id ? collectPlayer(id) : p);
          state = { ...state, players };
          saveState();
          const title = card.querySelector('.editor-title strong');
          const current = players.find(p => p.id === id);
          if (title && current) title.textContent = current.name;
        }
      });

      jsonImport.addEventListener('change', async () => {
        const file = jsonImport.files?.[0];
        jsonImport.value = '';
        if (!file) return;
        try {
          const parsed = JSON.parse(await file.text());
          if (!parsed || !Array.isArray(parsed.players) || !Array.isArray(parsed.picks)) throw new Error('invalid');
          state = { ...initialState(), ...parsed, selectedPlayerId: null };
          saveState(); render(); toast('백업을 불러왔습니다.');
        } catch { toast('올바른 드래프트 백업 파일이 아닙니다.', true); }
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && state.selectedPlayerId) { setState({ selectedPlayerId: null }); return; }
        if (state.stage !== 'profiles') return;
        if (event.key === 'ArrowLeft') setState({ profileIndex: (state.profileIndex - 1 + state.players.length) % state.players.length });
        if (event.key === 'ArrowRight' || event.key === ' ') {
          if (event.key === ' ') event.preventDefault();
          setState({ profileIndex: (state.profileIndex + 1) % state.players.length });
        }
      });

      render();
    })();
  </script>
</body>
</html>
